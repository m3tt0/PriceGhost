version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: priceghost-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: priceghost
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    image: ghcr.io/clucraft/priceghost-backend:latest
    container_name: priceghost-backend
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/priceghost
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3001
      NODE_ENV: production
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: ghcr.io/clucraft/priceghost-frontend:latest
    container_name: priceghost-frontend
    ports:
      - "8089:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
